services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: voyagent
      POSTGRES_PASSWORD: voyagent
      POSTGRES_DB: voyagent
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voyagent"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://voyagent:voyagent@db:5432/voyagent
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8000:80"
    depends_on:
      - backend

volumes:
  pgdata:
